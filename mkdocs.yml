      - Reporting: sut/reporting.md
  - JS Widgets:
      - Page elements: widgets/page-elements.md  
      - Supported JS Widgets Systems: widgets/supported-systems.md
      - Locator Strategies: widgets/locator-strategies.md
      - Widget Abstractions: widgets/widget-abstractions.md
  - Page Objects: 
      - Screen Area Composition: page-objects/screen-area-composition.md
