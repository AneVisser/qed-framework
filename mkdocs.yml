site_name: QED Test Automation Framework 
site_url: https://qed-testing.github.io/qed-core/
repo_url: https://github.com/AneVisser/QED 
repo_name: QED
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: images/qed_logo_only.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top      
    - navigation.prune    
    - toc.follow          
    - toc.integrate       
    - content.code.annotate
    - content.math
  palette:
    scheme: default
    primary: lightblue
    accent: lime
    

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - attr_list                  # useful if you want fenced-attrs like ```kotlin {..}
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      line_spans: __span
  - pymdownx.tabbed
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
      - name: mermaid
        class: mermaid
        format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10.4.0/dist/mermaid.min.js
  - assets/extra.js
extra_css:
  - assets/custom.css
  - assets/extra.css
